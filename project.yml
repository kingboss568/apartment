name: CondoLawIllustrated
options:
  bundleIdPrefix: com.taiwanarch
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: zh-Hant
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "7H7ZUG2WX8"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.2"
    CURRENT_PROJECT_VERSION: "6"

targets:
  TaiwanCondoLaw:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TaiwanCondoLaw/App
      - path: TaiwanCondoLaw/Models
      - path: TaiwanCondoLaw/Services
      - path: TaiwanCondoLaw/Views
      - path: TaiwanCondoLaw/Resources/data/articles.json
        buildPhase: resources
      - path: TaiwanCondoLaw/Resources/images
        type: group
        buildPhase: resources
      - path: TaiwanCondoLaw/Resources/Assets.xcassets
        buildPhase: resources
      - path: TaiwanCondoLaw/Resources/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: TaiwanCondoLaw/Resources/Configuration.storekit
        buildPhase: resources
    info:
      path: TaiwanCondoLaw/Resources/Info.plist
      properties:
        CFBundleDevelopmentRegion: zh_TW
        CFBundleDisplayName: 公寓大廈管理條例全圖解
        CFBundleName: 公寓大廈管理條例全圖解
        CFBundleShortVersionString: "1.2"
        CFBundleVersion: "6"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: LaunchScreenBG
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taiwanarch.condolaw
        TARGETED_DEVICE_FAMILY: "1,2"   # 1=iPhone 2=iPad
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  CommercialUpdateUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: TaiwanCondoLaw
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.taiwanarch.condolaw.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: TaiwanCondoLaw

schemes:
  TaiwanCondoLaw:
    build:
      targets:
        TaiwanCondoLaw: all
    run:
      config: Debug
      storeKitConfiguration: TaiwanCondoLaw/Resources/Configuration.storekit
    archive:
      config: Release
    test:
      config: Debug
      targets:
        - CommercialUpdateUITests
